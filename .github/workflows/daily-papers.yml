name: Daily Papers

on:
  schedule:
    - cron: '0 21 * * *'  # UTC 21:00 = beijing 05:00
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/daily-papers.yml'
      - 'config.yaml'

jobs:
  fetch-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run DailyPapers
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
        run: |
          python main.py

      - name: Show obsidian-import structure
        run: |
          echo "=== obsidian-import ==="
          find obsidian-import -type f | sort || echo "(empty)"
          echo ""
          echo "=== manifest ==="
          cat obsidian-import/manifest.json 2>/dev/null || echo "no manifest"

      - name: Commit and push daily papers (main branch)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add papers/ obsidian-import/manifest.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Update daily papers - $(date +'%Y-%m-%d')"
          git push

      - name: Push arXiv-sync branch (obsidian-import only)
        run: |
          cd "$GITHUB_WORKSPACE"
          # Save manifest path for sync script to know paper list
          mkdir -p obsidian-sync-meta
          cp obsidian-import/manifest.json obsidian-sync-meta/ 2>/dev/null || true

          git checkout --orphan arXiv-sync
          # Only include obsidian-import dir (per-paper JSONs)
          git add obsidian-import/
          git add obsidian-sync-meta/manifest.json 2>/dev/null || true
          echo "# arXiv-sync" > README_SYNC.md
          echo "Generated at: $(date)" >> README_SYNC.md
          git add README_SYNC.md
          git commit -m "Sync papers to Obsidian - $(date +'%Y-%m-%d')" || true
          git push -f origin arXiv-sync
