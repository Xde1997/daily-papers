# 研究领域关键词（用于LLM分类）
keywords:
  - "EDA Design Automation"
  - "TCAD Semiconductor"
  - "Circuit Design"
  - "Hardware Architecture"
  - "VLSI"
  - "Machine Learning EDA"
  - "AI for EDA"
  - "Neural Network Hardware"
  - "FPGA"
  - "Graph Neural Network"
  - "Deep Learning"
  - "Computer Vision"
  - "Signal Processing"

# ArXiv API配置
arxiv:
  max_results: 100
  base_url: "https://export.arxiv.org/api/query"
  # ArXiv API 搜索关键词（与类别组合使用，过滤出 EDA/TCAD 相关论文）
  search_terms:
    - "EDA"
    - "TCAD"
    - "VLSI"
    - "placement"
    - "routing"
    - "synthesis"
    - "circuit design"
    - "semiconductor"
    - "FPGA"
    - "hardware architecture"
  categories:
    - "cs.AR"        # Hardware Architecture (EDA 设计自动化相关)
    - "cs.AI"        # Artificial Intelligence
    - "cs.LG"        # Machine Learning
    - "cs.CV"        # Computer Vision
    - "eess.IV"      # Image and Video Processing
    - "eess.SP"      # Signal Processing
    - "eess.SY"      # Systems and Control
    - "cond-mat.mes-hall"  # Mesoscale and Nanoscale Physics (TCAD 器件仿真相关)
    - "physics.app-ph"     # Applied Physics (TCAD 应用物理)

# LLM配置
llm:
  min_score: 70
  max_papers_per_keyword: 5
  rate_limit_interval: 4.1
  
  # MiniMax 配置（优先使用）
  minimax:
    api_key: "${MINIMAX_API_KEY}"
    base_url: "https://api.minimax.chat/v1"
    model: "MiniMax-M2.7-highspeed"
    temperature: 0.3
    max_output_tokens: 2048
    timeout: 60
    max_retries: 3
    retry_delay_429: 10
    retry_delay_503: 10
    retry_delay_timeout: 5
  
  # Google Gemini 配置（备用）
  google:
    api_key: "${GOOGLE_AI_API_KEY}"
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    model: "auto"
    fallback_model: "gemma-4-31b-it"
    priority_models:
      - "gemini-3.1-flash-lite-preview"
      - "gemini-3-flash-preview"
      - "gemini-2.5-flash-lite"
      - "gemini-2.5-flash"
      - "gemma-4-31b-it"
      - "gemma-4-26b-a4b-it"
      - "gemma-3-27b-it"
      - "gemma-3-12b-it"
    temperature: 0.3
    max_output_tokens: 2048
    timeout: 60
    max_retries: 3
    retry_delay_429: 10
    retry_delay_503: 10
    retry_delay_timeout: 5

timezone: "Asia/Shanghai"
