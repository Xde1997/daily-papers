# 研究领域关键词（用于LLM分类）
keywords:
  - "Large Language Models"
  - "Natural Language Processing"
  - "Vision Language Models"
  - "Diffusion Models"
  - "Multimodal"
  - "Image Generation"
  - "Video Generation"
  - "Agent"
  - "Distributed Computing"
  - "Operating Systems"
  - "Information Retrieval"
  - "Computer Vision"
  - "Machine Learning"

# ArXiv API配置
arxiv:
  max_results: 100
  base_url: "http://export.arxiv.org/api/query"
  categories:
    - "cs.CV"
    - "cs.CL"
    - "cs.AI"
    - "cs.LG"
    - "cs.MM"
    - "cs.DC"
    - "cs.OS"
    - "cs.IR"
    - "cs.MA"

# LLM配置
llm:
  min_score: 70
  max_papers_per_keyword: 5
  rate_limit_interval: 4.1
  
  # MiniMax 配置（优先使用）
  minimax:
    api_key: "${MINIMAX_API_KEY}"
    base_url: "https://api.minimax.chat/v1"
    model: "MiniMax-M2.7-highspeed"
    temperature: 0.3
    max_output_tokens: 2048
    timeout: 60
    max_retries: 3
    retry_delay_429: 10
    retry_delay_503: 10
    retry_delay_timeout: 5
  
  # Google Gemini 配置（备用）
  google:
    api_key: "${GOOGLE_AI_API_KEY}"
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    model: "auto"
    fallback_model: "gemma-4-31b-it"
    priority_models:
      - "gemini-3.1-flash-lite-preview"
      - "gemini-3-flash-preview"
      - "gemini-2.5-flash-lite"
      - "gemini-2.5-flash"
      - "gemma-4-31b-it"
      - "gemma-4-26b-a4b-it"
      - "gemma-3-27b-it"
      - "gemma-3-12b-it"
    temperature: 0.3
    max_output_tokens: 2048
    timeout: 60
    max_retries: 3
    retry_delay_429: 10
    retry_delay_503: 10
    retry_delay_timeout: 5

timezone: "Asia/Shanghai"
